<!-- src/app/modules/admin/customer/components/customer-form-modal/customer-form-modal.component.html -->
<form [formGroup]="form" (ngSubmit)="onSubmit()" class="customer-form">

  <div class="form-row">
    <label class="form-label">Họ tên <span class="required">*</span></label>
    <input nz-input formControlName="fullname" placeholder="Nguyễn Văn A">
    <span class="form-error" *ngIf="form.get('fullname')?.invalid && form.get('fullname')?.touched">
      Vui lòng nhập họ tên
    </span>
  </div>

  <div class="form-row">
    <label class="form-label">Email <span class="required">*</span></label>
    <input nz-input formControlName="email" placeholder="email@example.com">
    <span class="form-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
      Email không hợp lệ
    </span>
  </div>

  <div class="form-row-group">
    <div class="form-row">
      <label class="form-label">Số điện thoại</label>
      <input nz-input formControlName="phone" placeholder="09xxxxxxxx">
    </div>
    <div class="form-row">
      <label class="form-label">Thu nhập / tháng</label>
      <input appVndInput formControlName="income" nz-input placeholder="VD: 15.000.000">
    </div>
  </div>

  <div class="form-row-group">
    <div class="form-row">
      <label class="form-label">Công ty</label>
      <input nz-input formControlName="company" placeholder="Tên công ty">
    </div>
    <div class="form-row">
      <label class="form-label">Tỉnh/Thành phố</label>
      <input nz-input formControlName="province" placeholder="VD: Hồ Chí Minh">
    </div>
  </div>

  <div class="form-row">
    <label class="form-label">Trạng thái</label>
    <nz-select formControlName="status" class="full-width">
      <nz-option *ngFor="let s of statusOptions" [nzValue]="s.value" [nzLabel]="s.label"></nz-option>
    </nz-select>
  </div>

  <div class="form-row">
    <label class="form-label">Ghi chú</label>
    <textarea nz-input formControlName="note" rows="3" placeholder="Ghi chú thêm về khách hàng..."></textarea>
  </div>

  <div class="form-actions">
    <button type="button" nz-button (click)="onCancel()">Huỷ</button>
    <button type="submit" nz-button nzType="primary" [nzLoading]="saving">
      {{ isEditMode ? 'Lưu thay đổi' : 'Thêm khách hàng' }}
    </button>
  </div>

</form>
